name: Bug report
description: Report a Click Foundry gameplay or interface problem
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Explain what you saw and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Place...
        3. Tap...
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Build diagnostics
      description: Leave the details inserted by the in-game Report Bug button here.
