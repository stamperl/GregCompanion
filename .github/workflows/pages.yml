name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set deployment metadata
        run: echo "VITE_DEPLOYED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_DEPLOY_VERSION: ${{ github.sha }}

      - name: Publish static site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf ../gh-pages-dist
          git worktree add --detach ../gh-pages-dist
          cd ../gh-pages-dist
          git checkout --orphan gh-pages
          git rm -rf . || true
          cp -a "$GITHUB_WORKSPACE/dist/." .
          touch .nojekyll
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push origin HEAD:gh-pages --force
