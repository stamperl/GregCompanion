<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Machine Terminal UI Approval V2</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        --paper: #c6bb91;
        --panel: #9f9573;
        --ink: #211a10;
        --line: #eee0ac;
        --edge: #504329;
        --dark: #0b0e0e;
        --approve: #315a34;
        --reject: #762f2c;
        --waiting: #625943;
        --cyan: #74d7e7;
      }

      * { box-sizing: border-box; }

      body {
        background: #080706;
        color: var(--ink);
        margin: 0;
        padding: 8px;
      }

      main {
        display: grid;
        gap: 9px;
        margin: 0 auto;
        max-width: 1180px;
      }

      header,
      .summary,
      .machine-card {
        background: var(--paper);
        border: 3px solid var(--line);
        border-bottom-color: var(--edge);
        border-right-color: var(--edge);
        box-shadow: 0 4px 0 #030302;
      }

      header,
      .summary { padding: 9px; }

      h1, h2, h3, p { margin: 0; }
      h1, h2, h3 { letter-spacing: 0; text-transform: uppercase; }
      h1 { font-size: 1rem; }
      h2 { font-size: 0.76rem; }
      h3 { font-size: 0.78rem; line-height: 1.1; }
      p, label, textarea { font-size: 0.68rem; font-weight: 800; line-height: 1.35; }

      .toolbar,
      .filters,
      .decision-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .toolbar { margin-top: 8px; }
      .filters { margin-top: 7px; }

      button,
      a {
        background: #433722;
        border: 2px solid #f3e5b4;
        border-bottom-color: #3d301d;
        border-radius: 0;
        border-right-color: #3d301d;
        color: #fff6d8;
        cursor: pointer;
        font: 900 0.62rem Inter, ui-sans-serif, system-ui, sans-serif;
        min-height: 34px;
        padding: 7px 9px;
        text-decoration: none;
        text-transform: uppercase;
      }

      button.approve { background: var(--approve); }
      button.reject { background: var(--reject); }
      button.selected { outline: 3px solid #fff17a; }
      button.filter.selected { background: #1e5662; }
      button:active, a:active { transform: translateY(2px); }

      .summary {
        display: grid;
        gap: 7px;
        position: sticky;
        top: 4px;
        z-index: 10;
      }

      .summary-line { font-size: 0.7rem; font-weight: 950; text-transform: uppercase; }
      .summary-line .approved { color: #254b27; }
      .summary-line .rejected { color: #6b211e; }
      .summary-line .waiting { color: var(--waiting); }
      .summary-line .incomplete { color: #8a3a17; }

      .grid {
        display: grid;
        gap: 9px;
        grid-template-columns: 1fr;
      }

      .machine-card {
        display: grid;
        gap: 7px;
        min-width: 0;
        padding: 8px;
      }

      .machine-card.approve { border-color: #a8d59d; }
      .machine-card.reject { border-color: #e29586; }
      .machine-card.needs-comment { box-shadow: 0 0 0 3px #a34225, 0 4px 0 #030302; }

      .machine-head {
        align-items: start;
        display: grid;
        gap: 6px;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .machine-id { color: #5c5543; font-size: 0.58rem; font-weight: 900; }
      .badge { background: #54452d; color: #fff0bf; font-size: 0.56rem; font-weight: 950; padding: 4px 6px; text-transform: uppercase; }
      .badge.lv { background: #294750; color: #cef5fb; }
      .badge.multi { background: #59332f; }
      .badge.logistics { background: #3e4c40; }

      .preview-grid {
        background: #111515;
        border: 2px solid #3d3322;
        display: grid;
        gap: 5px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        padding: 5px;
      }

      figure {
        align-content: start;
        display: grid;
        gap: 4px;
        margin: 0;
        min-width: 0;
      }

      figure img {
        background: #080b0b;
        display: block;
        height: auto;
        object-fit: contain;
        width: 100%;
      }

      figcaption {
        color: #b9dce1;
        font: 900 0.52rem "Courier New", ui-monospace, monospace;
        overflow-wrap: anywhere;
        text-align: center;
        text-transform: uppercase;
      }

      .shared-note {
        background: #8c8366;
        border-left: 4px solid #4d432f;
        color: #373124;
        padding: 5px 7px;
      }

      .status { color: var(--waiting); font-size: 0.64rem; font-weight: 950; text-transform: uppercase; }
      .status.approve { color: #224b27; }
      .status.reject { color: #6b211e; }

      .comment-wrap { display: none; gap: 4px; }
      .machine-card.reject .comment-wrap { display: grid; }
      .comment-wrap label { color: #5a211e; text-transform: uppercase; }

      textarea {
        background: #171918;
        border: 2px solid #e4d49f;
        border-bottom-color: #4c4029;
        border-radius: 0;
        border-right-color: #4c4029;
        color: #fff4d2;
        min-height: 76px;
        padding: 7px;
        resize: vertical;
        width: 100%;
      }

      textarea:focus { outline: 3px solid var(--cyan); }
      .empty { background: var(--paper); border: 3px solid var(--line); padding: 18px; text-align: center; }

      @media (max-width: 720px) {
        .grid { grid-template-columns: 1fr; }
        .preview-grid { grid-template-columns: 1fr; }
        .summary { position: static; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Machine Terminal UI Approval V2</h1>
        <p>Review every operational terminal in three real phone-sized game states: idle, active, and filled. Casing blocks correctly have no terminal. Decisions and rejection comments are stored in this browser.</p>
        <div class="toolbar">
          <a href="./index.html">Back to review board</a>
          <button type="button" id="copy-summary">Copy summary</button>
          <button type="button" id="download-json">Download JSON</button>
          <button type="button" id="approve-visible">Approve visible</button>
          <button type="button" id="reset-review">Reset review</button>
        </div>
        <div class="filters" id="filters" aria-label="Machine UI filters"></div>
      </header>

      <section class="summary" aria-label="Approval summary">
        <h2>Review progress</h2>
        <p class="summary-line" id="summary-line"></p>
        <textarea id="summary-output" readonly spellcheck="false" aria-label="Machine terminal review summary"></textarea>
      </section>

      <section class="grid" id="machine-grid" aria-label="Machine terminal UI approval grid"></section>
    </main>

    <script>
      const storageKey = 'click-foundry-machine-terminal-ui-approval-v2'
      const assetVersion = 'terminal-ui-approval-2026-07-11-3'
      const reviewStates = ['idle', 'active', 'filled']
      const groups = ['all', 'steam', 'lv', 'logistics', 'multi']
      const machines = [
        { id: 'furnace', name: 'Primitive Furnace', group: 'steam', assets: ['primitive-furnace-panel.webp'] },
        { id: 'well', name: 'Well', group: 'steam', assets: ['steam-utility-panel.webp'], shared: 'Shared Steam utility panel' },
        { id: 'steamBoiler', name: 'Steam Boiler', group: 'steam', assets: ['steam-utility-panel.webp'], shared: 'Shared Steam utility panel' },
        { id: 'steamTank', name: 'Iron Tank', group: 'steam', assets: ['steam-utility-panel.webp'], shared: 'Shared Steam utility panel' },
        { id: 'standardChest', name: 'Standard Chest', group: 'logistics', assets: ['item-logistics-panel.webp'], shared: 'Shared item logistics panel' },
        { id: 'hopper', name: 'Hopper', group: 'logistics', assets: ['item-logistics-panel.webp'], shared: 'Shared item logistics panel' },
        { id: 'copperPipe', name: 'Copper Steam Pipe', group: 'logistics', assets: ['steam-routing-panel.webp'], shared: 'Shared Steam routing panel' },
        { id: 'bronzePipe', name: 'Bronze Steam Pipe', group: 'logistics', assets: ['steam-routing-panel.webp'], shared: 'Shared Steam routing panel' },
        { id: 'ironPipe', name: 'Iron Steam Pipe', group: 'logistics', assets: ['steam-routing-panel.webp'], shared: 'Shared Steam routing panel' },
        { id: 'steamMacerator', name: 'Steam Macerator', group: 'steam', assets: ['steam-macerator-chamber.webp'] },
        { id: 'steamForgeHammer', name: 'Steam Forge Hammer', group: 'steam', assets: ['steam-forge-hammer-chamber.webp'] },
        { id: 'steamCompressor', name: 'Steam Compressor', group: 'steam', assets: ['steam-compressor-chamber.webp'] },
        { id: 'steamExtractor', name: 'Steam Extractor', group: 'steam', assets: ['steam-extractor-chamber.webp'] },
        { id: 'steamAlloySmelter', name: 'Steam Alloy Smelter', group: 'steam', assets: ['steam-alloy-smelter-chamber.webp'] },
        { id: 'steamFurnace', name: 'Steam Furnace', group: 'steam', assets: ['steam-furnace-chamber.webp'] },
        { id: 'steamAutoMiner', name: 'Steam Auto Miner', group: 'steam', assets: ['auto-miner-panel.webp'], shared: 'Shared auto-miner panel' },
        { id: 'steamTurbine', name: 'Steam Turbine', group: 'steam', assets: ['lv-power-panel.webp'], shared: 'Shared LV power panel' },
        { id: 'liquidSteamBoiler', name: 'Liquid Steam Boiler', group: 'steam', assets: ['liquid-boiler-panel.webp'] },
        { id: 'tinCable', name: '1A Tin Cable', group: 'lv', assets: ['lv-power-panel.webp'], shared: 'Shared LV power panel' },
        { id: 'tinCable2A', name: '2A Tin Cable', group: 'lv', assets: ['lv-power-panel.webp'], shared: 'Shared LV power panel' },
        { id: 'tinCable4A', name: '4A Tin Cable', group: 'lv', assets: ['lv-power-panel.webp'], shared: 'Shared LV power panel' },
        { id: 'tinCable8A', name: '8A Tin Cable', group: 'lv', assets: ['lv-power-panel.webp'], shared: 'Shared LV power panel' },
        { id: 'lvBatteryBuffer', name: '1A LV Battery Buffer', group: 'lv', assets: ['lv-power-panel.webp'], shared: 'Shared LV power panel' },
        { id: 'lvBatteryBuffer2A', name: '2A LV Battery Buffer', group: 'lv', assets: ['lv-power-panel.webp'], shared: 'Shared LV power panel' },
        { id: 'lvBatteryBuffer4A', name: '4A LV Battery Buffer', group: 'lv', assets: ['lv-power-panel.webp'], shared: 'Shared LV power panel' },
        { id: 'lvBatteryBuffer8A', name: '8A LV Battery Buffer', group: 'lv', assets: ['lv-power-panel.webp'], shared: 'Shared LV power panel' },
        { id: 'lvMacerator', name: 'LV Macerator', group: 'lv', assets: ['lv-macerator-chamber.webp'] },
        { id: 'lvForgeHammer', name: 'LV Forge Hammer', group: 'lv', assets: ['lv-forge-hammer-chamber.webp'] },
        { id: 'lvCompressor', name: 'LV Compressor', group: 'lv', assets: ['lv-compressor-chamber.webp'] },
        { id: 'lvExtractor', name: 'LV Extractor', group: 'lv', assets: ['lv-extractor-chamber.webp'] },
        { id: 'lvAlloySmelter', name: 'LV Alloy Smelter', group: 'lv', assets: ['lv-alloy-smelter-chamber.webp'] },
        { id: 'lvFurnace', name: 'LV Furnace', group: 'lv', assets: ['lv-furnace-chamber.webp'] },
        { id: 'lvWiremill', name: 'LV Wiremill', group: 'lv', assets: ['lv-wiremill-chamber.webp'] },
        { id: 'lvBender', name: 'LV Bender', group: 'lv', assets: ['lv-bender-chamber.webp'] },
        { id: 'lvLathe', name: 'LV Lathe', group: 'lv', assets: ['lv-lathe-chamber.webp'] },
        { id: 'lvElectrolyzer', name: 'LV Electrolyzer', group: 'lv', assets: ['lv-electrolyzer-chamber.webp'] },
        { id: 'lvAssembler', name: 'LV Assembler', group: 'lv', assets: ['lv-assembler-panel.webp', 'lv-assembler-stage.png'] },
        { id: 'lvCentrifuge', name: 'LV Centrifuge', group: 'lv', assets: ['lv-centrifuge-chamber.webp'] },
        { id: 'lvCanner', name: 'LV Canner', group: 'lv', assets: ['lv-canner-chamber.webp'] },
        { id: 'lvAutoMiner', name: 'LV Auto Miner', group: 'lv', assets: ['auto-miner-panel.webp'], shared: 'Shared auto-miner panel' },
        { id: 'cokeOven', name: 'Coke Oven Controller', group: 'multi', assets: ['coke-oven-panel.webp'], shared: 'Shared Coke Oven panel' },
        { id: 'brickedBlastFurnace', name: 'Bricked Blast Furnace', group: 'multi', assets: ['bricked-blast-furnace-panel.webp'], shared: 'Shared Bricked Blast Furnace panel' },
        { id: 'arcBlastFurnace', name: 'Arc Blast Furnace', group: 'multi', assets: ['arc-blast-furnace-panel.webp'], shared: 'Shared Arc Furnace panel' },
      ]

      const state = JSON.parse(localStorage.getItem(storageKey) || '{}')
      let activeFilter = 'all'
      const grid = document.getElementById('machine-grid')
      const filters = document.getElementById('filters')
      const summaryLine = document.getElementById('summary-line')
      const summaryOutput = document.getElementById('summary-output')

      function visibleMachines() {
        return activeFilter === 'all' ? machines : machines.filter((machine) => machine.group === activeFilter)
      }

      function save() {
        localStorage.setItem(storageKey, JSON.stringify(state))
      }

      function reviewFor(id) {
        return state[id] || { decision: '', comment: '' }
      }

      function statusText(review) {
        if (review.decision === 'approve') return 'Approved'
        if (review.decision === 'reject' && review.comment.trim()) return 'Rejected with comment'
        if (review.decision === 'reject') return 'Rejected - comment required'
        return 'Waiting for review'
      }

      function updateSummary() {
        const approved = machines.filter((machine) => reviewFor(machine.id).decision === 'approve')
        const rejected = machines.filter((machine) => reviewFor(machine.id).decision === 'reject')
        const incomplete = rejected.filter((machine) => !reviewFor(machine.id).comment.trim())
        const waiting = machines.filter((machine) => !reviewFor(machine.id).decision)
        summaryLine.innerHTML = `<span class="approved">${approved.length} approved</span> | <span class="rejected">${rejected.length} rejected</span> | <span class="waiting">${waiting.length} waiting</span> | <span class="incomplete">${incomplete.length} comments required</span>`
        const lines = [
          'Machine Terminal UI Approval V2',
          `Approved: ${approved.length}`,
          `Rejected: ${rejected.length}`,
          `Waiting: ${waiting.length}`,
          `Rejected without comment: ${incomplete.length}`,
          '',
          'Rejected machines:',
          ...(rejected.length
            ? rejected.map((machine) => `- ${machine.name} (${machine.id}): ${reviewFor(machine.id).comment.trim() || '[COMMENT REQUIRED]'}`)
            : ['None']),
          '',
          'Approved machines:',
          ...(approved.length ? approved.map((machine) => `- ${machine.name} (${machine.id})`) : ['None']),
          '',
          'Waiting machines:',
          ...(waiting.length ? waiting.map((machine) => `- ${machine.name} (${machine.id})`) : ['None']),
        ]
        summaryOutput.value = lines.join('\n')
      }

      function renderFilters() {
        filters.innerHTML = groups.map((group) => `<button type="button" class="filter ${activeFilter === group ? 'selected' : ''}" data-filter="${group}">${group}</button>`).join('')
      }

      function render() {
        renderFilters()
        const visible = visibleMachines()
        if (!visible.length) {
          grid.innerHTML = '<div class="empty">No machines in this filter.</div>'
          updateSummary()
          return
        }
        grid.innerHTML = visible.map((machine) => {
          const review = reviewFor(machine.id)
          const needsComment = review.decision === 'reject' && !review.comment.trim()
          return `
            <article class="machine-card ${review.decision} ${needsComment ? 'needs-comment' : ''}" data-card="${machine.id}">
              <div class="machine-head">
                <div><h3>${machine.name}</h3><p class="machine-id">${machine.id}</p></div>
                <span class="badge ${machine.group}">${machine.group}</span>
              </div>
              <div class="preview-grid">
                ${reviewStates.map((stateName) => `<figure><img src="./machine-terminal-ui-v2/${machine.id}-${stateName}.png?v=${assetVersion}" alt="${machine.name} ${stateName} in-game terminal at phone size" loading="lazy" /><figcaption>${stateName} - actual 590 x 1280 game state</figcaption></figure>`).join('')}
              </div>
              <p class="status ${review.decision}">${statusText(review)}</p>
              <div class="decision-row">
                <button type="button" class="approve ${review.decision === 'approve' ? 'selected' : ''}" data-id="${machine.id}" data-decision="approve">Approve</button>
                <button type="button" class="reject ${review.decision === 'reject' ? 'selected' : ''}" data-id="${machine.id}" data-decision="reject">Reject</button>
                <button type="button" data-id="${machine.id}" data-decision="clear">Clear</button>
              </div>
              <div class="comment-wrap">
                <label for="comment-${machine.id}">Rejection comment (required)</label>
                <textarea id="comment-${machine.id}" data-comment="${machine.id}" placeholder="What needs changing? Be specific about layout, animation, readability, scale, or artwork." spellcheck="true">${review.comment}</textarea>
              </div>
            </article>`
        }).join('')
        updateSummary()
      }

      filters.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-filter]')
        if (!button) return
        activeFilter = button.dataset.filter
        render()
      })

      grid.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-decision]')
        if (!button) return
        const id = button.dataset.id
        const decision = button.dataset.decision
        if (decision === 'clear') delete state[id]
        else state[id] = { ...reviewFor(id), decision }
        save()
        render()
        if (decision === 'reject') document.getElementById(`comment-${id}`)?.focus()
      })

      grid.addEventListener('input', (event) => {
        const textarea = event.target.closest('textarea[data-comment]')
        if (!textarea) return
        const id = textarea.dataset.comment
        state[id] = { ...reviewFor(id), comment: textarea.value }
        save()
        const card = textarea.closest('.machine-card')
        card.classList.toggle('needs-comment', !textarea.value.trim())
        card.querySelector('.status').textContent = statusText(reviewFor(id))
        updateSummary()
      })

      document.getElementById('approve-visible').addEventListener('click', () => {
        for (const machine of visibleMachines()) {
          if (!reviewFor(machine.id).decision) state[machine.id] = { ...reviewFor(machine.id), decision: 'approve' }
        }
        save()
        render()
      })

      document.getElementById('reset-review').addEventListener('click', () => {
        for (const machine of machines) delete state[machine.id]
        save()
        render()
      })

      document.getElementById('copy-summary').addEventListener('click', async () => {
        summaryOutput.select()
        try { await navigator.clipboard.writeText(summaryOutput.value) }
        catch { document.execCommand('copy') }
      })

      document.getElementById('download-json').addEventListener('click', () => {
        const payload = JSON.stringify({ version: 2, updatedAt: new Date().toISOString(), reviews: state }, null, 2)
        const link = document.createElement('a')
        link.href = URL.createObjectURL(new Blob([payload], { type: 'application/json' }))
        link.download = 'click-foundry-machine-ui-approvals-v2.json'
        link.click()
        URL.revokeObjectURL(link.href)
      })

      render()
    </script>
  </body>
</html>
