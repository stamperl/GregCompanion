<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steel Tank Icon Review</title>
    <style>
      body { margin: 0; background: #111315; color: #edf1f3; font: 16px system-ui, sans-serif; }
      main { width: min(560px, calc(100% - 32px)); margin: 32px auto; }
      h1 { font-size: 24px; letter-spacing: 0; }
      figure { margin: 0; padding: 16px; border: 1px solid #3c454d; background: #20252a; }
      .preview { display: flex; align-items: end; justify-content: center; gap: 20px; min-height: 160px; background: #090b0d; }
      img { image-rendering: auto; object-fit: contain; }
      .large { width: 128px; height: 128px; }
      .slot { width: 40px; height: 40px; }
      figcaption { margin-top: 10px; color: #bac5cc; }
    </style>
  </head>
  <body>
    <main>
      <h1>Steel Tank</h1>
      <figure>
        <div class="preview">
          <img class="large" src="steelTank-candidate.png" alt="Steel Tank icon candidate" />
          <img class="slot" src="steelTank-candidate.png" alt="" />
        </div>
        <figcaption>Candidate v1 - approved in chat</figcaption>
      </figure>
    </main>
  </body>
</html>
